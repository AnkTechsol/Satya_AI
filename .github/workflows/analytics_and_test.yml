name: Analytics and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install streamlit beautifulsoup4 markdownify requests pandas gitpython pytest

      - name: Run Tests
        run: |
          PYTHONPATH=. pytest tests/ --maxfail=1 --tb=short

      - name: Generate Analytics
        run: |
          python generate_analytics.py

      - name: Commit Analytics and README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add REPO_ANALYTICS.md repo_analytics.json README.md
          git commit -m "docs(analytics): auto-update repo analytics and README" || echo "No changes to commit"
          # NOTE: Configure github action to explicitly perform git push to remote
