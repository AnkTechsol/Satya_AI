name: Auto-README updater (Analytics -> README)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run-analytics-and-update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests bs4 markdownify streamlit pandas gitpython pytest

      - name: Run test suite and analytics script
        run: |
          PYTHONPATH=. AUDIT_SECRET=dummy_secret pytest tests/
          PYTHONPATH=. AUDIT_SECRET=dummy_secret python generate_analytics.py

      - name: Commit changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add REPO_ANALYTICS.md repo_analytics.json README.md
          git commit -m "chore: auto-update REPO_ANALYTICS and README" || exit 0
          git push
