name: Run Analytics & Auto-Update README

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for auto-commit

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 markdownify pandas gitpython pytest
          pip install .

      - name: Run Analytics and Agent Harness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python generate_analytics.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add repo_analytics.json REPO_ANALYTICS.md README.md
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: auto-update repo analytics and README"
            git push
          fi
