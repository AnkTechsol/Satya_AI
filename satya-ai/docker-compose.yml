version: '3.8'

services:
  satya:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SATYA_AGENT_KEYS=DEMO_KEY,prod-key-123
      - AUDIT_SECRET=docker-secret-audit-key
      - DATABASE_URL=postgresql+asyncpg://satya:satyapass@postgres:5432/satya
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn satya.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=satya
      - POSTGRES_PASSWORD=satyapass
      - POSTGRES_DB=satya
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satya"]
      interval: 5s
      timeout: 5s
      retries: 5
